<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cesar Roofing App</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
padding:20px;
background:#f4f4f4;
}
h1{text-align:center;}
input,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}
button{
background:#0a7cff;
color:white;
font-weight:bold;
}
.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<h1>Cesar Roofing</h1>

<div class="card">
<h3>Add Client</h3>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<input id="address" placeholder="Address">

<button id="saveBtn">Save Client</button>
</div>

<div class="card">
<h3>Clients</h3>
<div id="clientList"></div>
</div>
  
<script>

const supabaseClient = supabase.createClient(
"https://rwqnehuemoiukxcccosk.supabase.co",
"sb_publishable_0GGlqjr-2g_zGxUdBjM_fg_WHjZIdtQ"
);

async function saveClient(){

let name = document.getElementById("name").value
let phone = document.getElementById("phone").value
let email = document.getElementById("email").value
let address = document.getElementById("address").value

const { data, error } = await supabaseClient
.from("clients")
.insert([{ name, phone, email, address }])

if(error){
alert(error.message)
}else{
alert("Client saved")
}

}

async function loadClients(){

const { data, error } = await supabaseClient
.from("clients")
.select("*")
.order("id",{ascending:false})

if(error){
  console.log(error)
  return
}

let list = document.getElementById("clientList")

list.innerHTML = ""

if(!data || data.length === 0){
  list.innerHTML = "No clients yet"
  return
}

data.forEach(client => {

list.innerHTML += `
<div style="border-bottom:1px solid #eee;padding:10px 0;">
<strong>${client.name || "No Name"}</strong><br>
📞 ${client.phone || ""}
<br>
📍 ${client.address || ""}
</div>
`

})

}
document.getElementById("saveBtn").addEventListener("click", saveClient);
loadClients()
  
</script>

</body>
</html>
